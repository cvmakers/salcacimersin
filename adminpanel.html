<!doctype html>
<html lang="tr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meritay Dosyaya Yazabilen Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7f6;
            font-family: Arial, Helvetica, sans-serif;
            padding: 24px
        }

        .box {
            background: #fff;
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .07)
        }

        h1 {
            font-weight: 950;
            color: #159c57
        }

        .btn-main {
            background: #159c57;
            color: #fff;
            font-weight: 900;
            border: 0;
            border-radius: 12px;
            padding: 13px 18px
        }

        .note {
            background: #fff7e8;
            border: 1px solid #ffd899;
            border-radius: 12px;
            padding: 12px;
            color: #6b4a11
        }

        .product-card {
            border: 1px solid #e8eee9;
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 14px
        }

        label {
            font-weight: 800
        }

        .mini-img {
            width: 90px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #f1f1f1
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
            <h1>MERİTAY BOTANİK - Dosyaya Yazabilen Admin</h1>
            <p>Bu panel seçtiğin <b>index.html</b> dosyasındaki banner ve ürünleri düzenleyip aynı dosyaya kaydeder.</p>
            <div class="note">Chrome / Edge kullan. Görseli PC’den seçebilirsin. Seçilen görsel Base64 olarak index.html
                içine gömülür.</div>
        </div>

        <div class="box">
            <button class="btn-main" onclick="openFile()">index.html Dosyasını Seç</button>
            <button class="btn btn-dark ms-2" onclick="saveFile()">Dosyaya Kaydet</button>
            <span id="status" class="ms-3 fw-bold"></span>
        </div>

        <div class="box">
            <h3>Banner Ayarları</h3>
            <div class="row g-3">
                <div class="col-md-4"><label>Hero Üst Kelime</label><input id="heroLight" class="form-control"></div>
                <div class="col-md-4"><label>Hero Ana Kelime</label><input id="heroMain" class="form-control"></div>
                <div class="col-md-4"><label>Banner Görsel URL / Base64</label><input id="bannerSrc"
                        class="form-control"></div>
                <div class="col-md-8"><label>PC’den Banner Görsel Seç</label><input type="file" accept="image/*"
                        class="form-control" onchange="uploadBanner(this)"></div>
                <div class="col-md-4"><label>Önizleme</label><br><img id="bannerPreview" class="mini-img"></div>
                <div class="col-md-12"><label>Hero Açıklama</label><input id="heroText" class="form-control"></div>
            </div>
        </div>

        <div class="box">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="mb-0">Ürünler</h3>
                <button class="btn btn-success" onclick="addProduct()">+ Ürün Ekle</button>
            </div>
            <div id="products"></div>
        </div>
    </div>

    <script>
        let fileHandle = null, htmlText = "", products = [];

        async function openFile() {
            if (!window.showOpenFilePicker) { alert("Bu özellik için Chrome veya Edge kullan."); return; }
            [fileHandle] = await window.showOpenFilePicker({ types: [{ description: "HTML", accept: { "text/html": [".html"] } }] });
            const file = await fileHandle.getFile();
            htmlText = await file.text();
            parseHTML();
            document.getElementById("status").innerText = "Dosya yüklendi: " + file.name;
        }

        function parseHTML() {
            const doc = new DOMParser().parseFromString(htmlText, "text/html");
            const banner = doc.querySelector(".hero-banner > img");
            const bannerSrc = banner ? banner.getAttribute("src") || "" : "";
            document.getElementById("bannerSrc").value = bannerSrc;
            document.getElementById("bannerPreview").src = bannerSrc;

            const light = doc.querySelector(".hero-copy h1 .light");
            const h1 = doc.querySelector(".hero-copy h1");
            document.getElementById("heroLight").value = light ? light.textContent.trim() : "";
            document.getElementById("heroMain").value = h1 ? h1.textContent.replace(light ? light.textContent : "", "").trim() : "";
            const p = doc.querySelector(".hero-copy p");
            document.getElementById("heroText").value = p ? p.textContent.replace(/\s+/g, " ").trim() : "";

            products = [];
            doc.querySelectorAll(".product-card").forEach(card => {
                const title = card.querySelector(".product-name")?.textContent.trim() || "";
                const price = card.querySelector(".price")?.textContent.trim() || "";
                const imgDiv = card.querySelector(".product-img");
                let image = "";
                if (imgDiv) {
                    const bg = imgDiv.getAttribute("style") || "";
                    const m = bg.match(/url\(['"]?(.*?)['"]?\)/);
                    image = m ? m[1] : "";
                }
                products.push({ title, price, image });
            });
            renderProducts();
        }

        function fileToBase64(file, cb) {
            const reader = new FileReader();
            reader.onload = () => cb(reader.result);
            reader.readAsDataURL(file);
        }

        function uploadBanner(input) {
            const file = input.files[0];
            if (!file) return;
            fileToBase64(file, (base64) => {
                document.getElementById("bannerSrc").value = base64;
                document.getElementById("bannerPreview").src = base64;
            });
        }

        function uploadProductImage(input, index) {
            const file = input.files[0];
            if (!file) return;
            fileToBase64(file, (base64) => {
                products[index].image = base64;
                renderProducts();
            });
        }

        function renderProducts() {
            const wrap = document.getElementById("products");
            wrap.innerHTML = "";
            products.forEach((p, i) => {
                wrap.innerHTML += `
    <div class="product-card">
      <div class="row g-2 align-items-end">
        <div class="col-md-2">
          <label>Önizleme</label><br>
          <img class="mini-img" src="${escAttr(p.image)}">
        </div>
        <div class="col-md-3"><label>Başlık</label><input class="form-control" value="${escAttr(p.title)}" oninput="products[${i}].title=this.value"></div>
        <div class="col-md-2"><label>Fiyat</label><input class="form-control" value="${escAttr(p.price)}" oninput="products[${i}].price=this.value"></div>
        <div class="col-md-3"><label>Görsel URL / Base64</label><input class="form-control" value="${escAttr(p.image)}" oninput="products[${i}].image=this.value"></div>
        <div class="col-md-1"><label>PC</label><input type="file" accept="image/*" class="form-control" onchange="uploadProductImage(this,${i})"></div>
        <div class="col-md-1"><button class="btn btn-danger w-100" onclick="removeProduct(${i})">Sil</button></div>
      </div>
    </div>`;
            });
        }
        function escAttr(s) { return String(s).replaceAll("&", "&amp;").replaceAll('"', "&quot;").replaceAll("<", "&lt;"); }
        function escHTML(s) { return String(s).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;"); }
        function removeProduct(i) { products.splice(i, 1); renderProducts(); }
        function addProduct() { products.push({ title: "Yeni Ürün", price: "0 TL", image: "https://via.placeholder.com/800x800" }); renderProducts(); }

        function applyChanges() {
            const doc = new DOMParser().parseFromString(htmlText, "text/html");
            const banner = doc.querySelector(".hero-banner > img");
            if (banner) banner.setAttribute("src", document.getElementById("bannerSrc").value);

            const h1 = doc.querySelector(".hero-copy h1");
            if (h1) h1.innerHTML = `<span class="light">${escHTML(document.getElementById("heroLight").value)}</span> ${escHTML(document.getElementById("heroMain").value)}`;

            const p = doc.querySelector(".hero-copy p");
            if (p) p.innerHTML = escHTML(document.getElementById("heroText").value);

            const grid = doc.querySelector(".product-grid");
            if (grid) {
                grid.innerHTML = products.map((p, i) => `
<article class="product-card">${i === 0 ? '<span class="tag">Çok Satan</span>' : ''}<button class="fav"><i class="fa-regular fa-heart"></i></button>
<div class="product-img" style="background-image:url('${escAttr(p.image)}')"></div>
<div class="product-body"><h2 class="product-name">${escHTML(p.title)}</h2><div class="rating">★★★★★ <span>(56)</span></div><div class="price">${escHTML(p.price)}</div><a class="order-btn track-whatsapp" target="_blank" href="https://wa.me/905425716844?text=${encodeURIComponent(p.title + ' siparişi vermek istiyorum')}">Sipariş Ver</a></div>
</article>`).join("\n");
            }
            htmlText = "<!doctype html>\n" + doc.documentElement.outerHTML;
        }

        async function saveFile() {
            if (!fileHandle) { alert("Önce index.html dosyasını seç."); return; }
            applyChanges();
            const writable = await fileHandle.createWritable();
            await writable.write(htmlText);
            await writable.close();
            document.getElementById("status").innerText = "Kaydedildi ✅";
        }
    </script>
</body>

</html>
